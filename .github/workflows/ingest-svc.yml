name: Ingest Services

on:
  workflow_dispatch:
  schedule:
    - cron: '14 3 * * *'  
jobs:
  ingest-svc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set exec_ref
        run: echo "EXEC_REF=$(date -u +'%Y%m%d_%H%M%S')" >> $GITHUB_ENV

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.BIGQUERY_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: List BigQuery datasets
        run: bq ls
        
      - name: Print exec_ref
        run: echo "Exec ref is $EXEC_REF"
