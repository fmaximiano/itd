name: Ingestão API MG para BigQuery

on:
  workflow_dispatch:
    inputs:
      acao:
        description: "Ação a executar"
        required: true
        default: "reprocessar"
        type: choice
        options:
          - reprocessar
          - restaurar

      mes_referencia:
        description: "Mês de referência no formato YYYY-MM. Se vazio, usa o mês anterior."
        required: false
        type: string

      modo_execucao:
        description: "Origem da execução"
        required: false
        default: "manual_github"
        type: string

      usuario_solicitante:
        description: "Usuário que solicitou a execução"
        required: false
        type: string

  schedule:
    # 07:00 em São Paulo = 10:00 UTC
    # Todo dia 5 de cada mês
    - cron: "0 10 5 * *"

permissions:
  contents: read

concurrency:
  group: ingestao-api-bigquery
  cancel-in-progress: false

jobs:
  ingestao-api:
    name: Rodar pipeline de ingestão da API
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      GCP_PROJECT_ID: digital-transformation-map
      BQ_DATASET: dataset_servicos
      BQ_TABLE: raw_api_snapshot
      API_KEY: ${{ secrets.API_KEY }}

      API_URL: https://www.mg.gov.br/api/v4/servicos_etapas
      REQUEST_TIMEOUT: "60"
      EXCEL_PATH: data/excel

      ACAO: ${{ github.event_name == 'schedule' && 'reprocessar' || inputs.acao }}
      MES_REFERENCIA: ${{ inputs.mes_referencia }}
      MODO_EXECUCAO: ${{ github.event_name == 'schedule' && 'github_schedule' || inputs.modo_execucao }}
      USUARIO_SOLICITANTE: ${{ github.event_name == 'schedule' && 'github_schedule' || inputs.usuario_solicitante }}
      GITHUB_RUN_ID: ${{ github.run_id }}
      EXECUTION_ID: ${{ github.run_id }}-${{ github.run_attempt }}

      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Baixar código
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Conferir inputs recebidos
        run: |
          echo "ACAO=$ACAO"
          echo "MES_REFERENCIA=$MES_REFERENCIA"
          echo "MODO_EXECUCAO=$MODO_EXECUCAO"
          echo "USUARIO_SOLICITANTE=$USUARIO_SOLICITANTE"
          echo "EXECUTION_ID=$EXECUTION_ID"

      - name: Rodar pipeline da API
        run: python api.py
